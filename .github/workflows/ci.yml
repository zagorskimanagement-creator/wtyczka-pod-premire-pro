name: CI

on:
  push:
    branches: [main, develop, 'claude/**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  lint-and-typecheck:
    name: Lint & TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: TypeCheck all packages
        run: npm run typecheck
      - name: Lint
        run: npm run lint

  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: shortforge
          POSTGRES_PASSWORD: shortforge
          POSTGRES_DB: shortforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npm run db:generate
        working-directory: apps/api-server
        env:
          DATABASE_URL: postgresql://shortforge:shortforge@localhost:5432/shortforge_test
      - name: Run migrations
        run: npx prisma migrate deploy
        working-directory: apps/api-server
        env:
          DATABASE_URL: postgresql://shortforge:shortforge@localhost:5432/shortforge_test
      - name: Run API tests
        run: npm run test -- --coverage
        working-directory: apps/api-server
        env:
          DATABASE_URL: postgresql://shortforge:shortforge@localhost:5432/shortforge_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret
          NODE_ENV: test
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: apps/api-server/coverage/lcov.info
          flags: api

  test-ai-engine:
    name: AI Engine Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build shared package
        run: npm run build --workspace=@shortforge/shared
      - name: Run AI engine tests
        run: npm run test -- --coverage
        working-directory: packages/ai-engine
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: packages/ai-engine/coverage/lcov.info
          flags: ai-engine

  build:
    name: Build All Packages
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npm run db:generate
        working-directory: apps/api-server
        env:
          DATABASE_URL: postgresql://shortforge:shortforge@localhost:5432/shortforge
      - name: Build all packages
        run: npm run build
      - name: Build Premiere plugin
        run: npm run build
        working-directory: apps/premiere-plugin

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.api
          push: false
          tags: shortforge-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.worker
          push: false
          tags: shortforge-worker:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
